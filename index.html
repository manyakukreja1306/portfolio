<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manya Kukreja — Software Engineer | 3D Portfolio</title>
  <meta name="description" content="Manya Kukreja's interactive 3D portfolio — a stylized surf shop experience built with Three.js. Explore projects, skills, and experience in a tropical low-poly world." />
  <meta name="author" content="Manya Kukreja" />
  <meta property="og:title" content="Manya Kukreja — 3D Surf Shop Portfolio" />
  <meta property="og:description" content="Interactive 3D portfolio built with Three.js and GSAP. Explore projects, skills, and experience." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Chewy&family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&family=Permanent+Marker&family=Cinzel:wght@600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loader-content">
      <div class="loader-icon">
        <svg class="surfboard-spinner" viewBox="0 0 40 120" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="20" cy="60" rx="14" ry="55" fill="url(#surfGrad)" stroke="#fff" stroke-width="1.5"/>
          <line x1="20" y1="8" x2="20" y2="112" stroke="#fff" stroke-width="1" opacity="0.4"/>
          <defs>
            <linearGradient id="surfGrad" x1="6" y1="5" x2="34" y2="115">
              <stop offset="0%" stop-color="#F2C94C"/>
              <stop offset="50%" stop-color="#E8845C"/>
              <stop offset="100%" stop-color="#D35F5F"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h2 class="loader-title">Manya's Surf Shack</h2>
      <p class="loader-subtitle" id="loader-message">Waxing the board...</p>
      <div class="loader-bar-track">
        <div class="loader-bar-fill" id="loader-bar"></div>
      </div>
      <p class="loader-percent" id="loader-percent">0%</p>
    </div>
  </div>

  <!-- 3D Canvas -->
  <canvas id="experience-canvas"></canvas>

  <!-- Audio Toggle -->
  <button id="audio-toggle" class="audio-btn" aria-label="Toggle ambient audio">
    <svg id="audio-icon-off" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
      <line x1="23" y1="9" x2="17" y2="15"></line>
      <line x1="17" y1="9" x2="23" y2="15"></line>
    </svg>
    <svg id="audio-icon-on" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
    </svg>
  </button>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
